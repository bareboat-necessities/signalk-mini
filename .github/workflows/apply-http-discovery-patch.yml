name: Apply HTTP discovery patch

on:
  push:
    branches: [fix/signalk-http-discovery]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/signalk-http-discovery
      - name: Apply patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          ws = Path('modules/async-event-loop/src/async_event_loop/websocket_server.hpp')
          s = ws.read_text()
          s = s.replace(
'''    virtual void on_websocket_binary(ITcpConnection& connection, const uint8_t* data, size_t len) {
        (void)connection;
        (void)data;
        (void)len;
    }

    virtual void on_websocket_close''',
'''    virtual void on_websocket_binary(ITcpConnection& connection, const uint8_t* data, size_t len) {
        (void)connection;
        (void)data;
        (void)len;
    }

    // Handle a complete ordinary HTTP request received on the same listener.
    // Return true only after writing a complete response.
    virtual bool on_http_request(ITcpConnection& connection,
                                 const TcpPeerInfo& peer,
                                 const char* header,
                                 size_t header_len) {
        (void)connection;
        (void)peer;
        (void)header;
        (void)header_len;
        return false;
    }

    // Validate the WebSocket resource before the 101 response is written.
    virtual bool accept_websocket_request(const websocket::HandshakeRequest& request) {
        (void)request;
        return true;
    }

    virtual void on_websocket_close''', 1)
          s = s.replace(
'''            if (parsed != websocket::HandshakeResult::Ok) {
                fail_and_close(slot, parsed == websocket::HandshakeResult::UnsupportedVersion ? WebSocketError::UnsupportedVersion : WebSocketError::BadHandshake);
                return false;
            }

            char response[192];''',
'''            if (parsed != websocket::HandshakeResult::Ok) {
                if (handler_.on_http_request(*slot.connection,
                                             slot.peer,
                                             reinterpret_cast<const char*>(slot.input),
                                             header_len)) {
                    ITcpConnection* connection = slot.connection;
                    release(*connection);
                    connection->close();
                    return false;
                }
                fail_and_close(slot, parsed == websocket::HandshakeResult::UnsupportedVersion ? WebSocketError::UnsupportedVersion : WebSocketError::BadHandshake);
                return false;
