name: Run HTTP discovery patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/signalk-http-discovery' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/signalk-http-discovery
      - name: Apply patch
        run: python3 tools/apply_http_discovery_patch.py
      - name: Commit patch
        run: |
          rm -f .github/workflows/apply-http-discovery-patch.yml
          rm -f .github/workflows/run-http-discovery-patch.yml
          rm -f tools/apply_http_discovery_patch.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Serve Signal K discovery over HTTP"
          git push origin HEAD:fix/signalk-http-discovery
