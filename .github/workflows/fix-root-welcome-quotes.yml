name: Fix root welcome page literals

on:
  pull_request:
    types: [edited]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feature/root-welcome-page-final'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/root-welcome-page-final
      - name: Fix C++ HTML literals
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('src/signalk_mini/server.hpp')
          s = p.read_text()
          s = s.replace('<meta charset="utf-8">', '<meta charset=\\"utf-8\\">')
          s = s.replace('<a href="/signalk">', '<a href=\\"/signalk\\">')
          p.write_text(s)
          PY
          rm .github/workflows/fix-root-welcome-quotes.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Fix welcome page HTML literals"
          git push origin HEAD:feature/root-welcome-page-final
