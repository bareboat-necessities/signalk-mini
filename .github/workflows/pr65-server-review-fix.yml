name: Apply PR65 WebSocket review fix

on:
  push:
    branches:
      - agent/signalk-schema-typed-view

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified WebSocket TX guard
        shell: python
        run: |
          from pathlib import Path
          path = Path("src/signalk_mini/server.hpp")
          text = path.read_text()
          old = '''            const InitialStreamScope scope = owner.websocket_initial_scope(request.resource);
                      const bool active_subscription = scope != InitialStreamScope::None;
                      const bool send_current = active_subscription && owner.config_.publisher.send_current_values_on_connect &&
                                                owner.websocket_should_send_current_values(request.resource);
                      ConnectionFlags flags{owner.config_.signalk.websocket.allow_rx,
                                            owner.config_.signalk.websocket.allow_tx && active_subscription};
          '''
          new = '''            const InitialStreamScope scope = owner.websocket_initial_scope(request.resource);
                      const bool active_subscription = scope != InitialStreamScope::None;
                      const bool tx_enabled = owner.config_.signalk.websocket.allow_tx && active_subscription;
                      const bool send_current = tx_enabled && owner.config_.publisher.send_current_values_on_connect &&
                                                owner.websocket_should_send_current_values(request.resource);
                      ConnectionFlags flags{owner.config_.signalk.websocket.allow_rx, tx_enabled};
          '''
          if text.count(old) != 1:
              raise SystemExit("expected WebSocket snippet was not found exactly once")
          path.write_text(text.replace(old, new))
      - name: Commit clean source change
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/pr65-server-review-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Honor WebSocket transmit access for snapshots'
          git push origin HEAD:agent/signalk-schema-typed-view
