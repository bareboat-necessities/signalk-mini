name: Debug PR22 once

on:
  push:
    branches:
      - codex/expand-signalk-mapping

jobs:
  debug:
    if: ${{ !contains(github.event.head_commit.message, '[debug-pr22-done]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev libconfig-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug > debug.log 2>&1
      - name: Build
        run: cmake --build build --parallel >> debug.log 2>&1
      - name: Test
        run: ctest --test-dir build --output-on-failure >> debug.log 2>&1
      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr22-debug-log
          path: debug.log
