name: Apply agent patch parts

on:
  push:
    branches:
      - agent/ubx-connectors

permissions:
  contents: write

jobs:
  apply:
    if: github.event.head_commit.message == 'Upload combined UBX connector patch parts'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch
        run: |
          cat agent-patch/part-* > /tmp/agent-ubx.patch.gz.b64
          base64 -d /tmp/agent-ubx.patch.gz.b64 > /tmp/agent-ubx.patch.gz
          gzip -dc /tmp/agent-ubx.patch.gz > /tmp/agent-ubx.patch
          git apply --check /tmp/agent-ubx.patch
          git apply /tmp/agent-ubx.patch
          rm -rf agent-patch .github/workflows/apply-agent-patch.yml .github/workflows/apply-agent-patch-parts.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Add UBX connector lifecycle, parser, and runtime'
          git push origin HEAD:agent/ubx-connectors
