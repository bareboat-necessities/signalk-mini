name: Apply agent patch parts

on:
  push:
    branches:
      - agent/ubx-connectors
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-agent-ubx-connectors
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'pull_request' || github.event.head_commit.message == 'Upload combined UBX connector patch parts'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/ubx-connectors
          show-progress: false
      - name: Assemble and publish patch
        run: |
          set +e
          diag=/tmp/agent-patch-diagnostics.txt
          : > "$diag"
          sha256sum agent-patch/part-* >> "$diag"
          cat agent-patch/part-* > /tmp/agent-ubx.patch.gz.b64
          sha256sum /tmp/agent-ubx.patch.gz.b64 >> "$diag"
          actual=$(sha256sum /tmp/agent-ubx.patch.gz.b64 | cut -d' ' -f1)
          expected=22d59c3b67ecf2e359ccf234bfd9cc61806af8dde05d4897b4493e521b785ebe
          if [ "$actual" != "$expected" ]; then
            echo "assembled checksum mismatch: expected=$expected actual=$actual" >> "$diag"
            exit 1
          fi
          base64 -d /tmp/agent-ubx.patch.gz.b64 > /tmp/agent-ubx.patch.gz 2>> "$diag" || exit 1
          gzip -t /tmp/agent-ubx.patch.gz 2>> "$diag" || exit 1
          gzip -dc /tmp/agent-ubx.patch.gz > /tmp/agent-ubx.patch 2>> "$diag" || exit 1
          sha256sum /tmp/agent-ubx.patch.gz /tmp/agent-ubx.patch >> "$diag"
          git apply --check /tmp/agent-ubx.patch >> "$diag" 2>&1 || exit 1
          git apply /tmp/agent-ubx.patch >> "$diag" 2>&1
          apply_status=$?
          echo "git_apply_status=$apply_status" >> "$diag"
          [ "$apply_status" -eq 0 ] || exit "$apply_status"
          git checkout HEAD -- .github/workflows/ci.yml
          rm -rf agent-patch .github/workflows/apply-agent-patch.yml .github/workflows/apply-agent-patch-parts.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git status --short >> "$diag"
          git commit -m 'Add UBX connector lifecycle, parser, and runtime' >> "$diag" 2>&1
          commit_status=$?
          echo "git_commit_status=$commit_status" >> "$diag"
          [ "$commit_status" -eq 0 ] || exit "$commit_status"
          git push origin HEAD:agent/ubx-connectors >> "$diag" 2>&1
          push_status=$?
          echo "git_push_status=$push_status" >> "$diag"
          exit "$push_status"
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubx-patch-diagnostics
          path: /tmp/agent-patch-diagnostics.txt
