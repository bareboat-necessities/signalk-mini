name: Apply PR65 position completeness fix

on:
  push:
    branches:
      - agent/signalk-schema-typed-view

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore complete Signal K position rule
        shell: python
        run: |
          from pathlib import Path
          path = Path("src/signalk_mini/signalk_mapper.hpp")
          text = path.read_text()
          old = "model.gnss.fix.fix_lat_deg.valid || model.gnss.fix.fix_lon_deg.valid || model.gnss.fix.fix_alt_hae_m.valid"
          new = "model.gnss.fix.fix_lat_deg.valid && model.gnss.fix.fix_lon_deg.valid"
          if text.count(old) != 1:
              raise SystemExit("expected position availability expression was not found exactly once")
          path.write_text(text.replace(old, new))
      - name: Commit clean source change
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/pr65-position-completeness-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Require complete coordinates for Signal K position'
          git push origin HEAD:agent/signalk-schema-typed-view
