name: Fix HTTP response test

on:
  pull_request:
    types: [edited]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'fix/signalk-http-discovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/signalk-http-discovery
      - name: Fix HTTP response completion detection
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('tests/test_signalk_mini_websocket_integration.cpp')
          s = p.read_text()
          old = '''        if (n == 0) return response.find("\\r\\n\\r\\n") != std::string::npos;
        response.append(chunk, static_cast<size_t>(n));
    }
    return false;
}'''
          new = '''        if (n == 0) return response.find("\\r\\n\\r\\n") != std::string::npos;
        response.append(chunk, static_cast<size_t>(n));

        const size_t header_end = response.find("\\r\\n\\r\\n");
        if (header_end == std::string::npos) continue;
        const size_t content_length_pos = response.find("Content-Length:");
        if (content_length_pos == std::string::npos || content_length_pos > header_end) return true;
        size_t value = content_length_pos + std::strlen("Content-Length:");
        while (value < header_end && (response[value] == ' ' || response[value] == '\\t')) ++value;
        size_t body_length = 0;
        while (value < header_end && response[value] >= '0' && response[value] <= '9') {
            body_length = body_length * 10u + static_cast<size_t>(response[value] - '0');
            ++value;
        }
        if (response.size() >= header_end + 4u + body_length) return true;
    }
    return false;
}'''
          if old not in s:
              raise SystemExit('HTTP response helper marker not found')
          p.write_text(s.replace(old, new, 1))
          PY
          rm .github/workflows/fix-http-response-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete HTTP tests from Content-Length"
          git push origin HEAD:fix/signalk-http-discovery
