name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-ais-fixture-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/signalk-schema-typed-view'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified fixture fix
        shell: bash
        run: |
          set -euo pipefail
          echo '263388c1734c62a7da953cb97cc36cf2943b0795af023539c80ee217219d6268  .github/pr65-ais-fixture.patch' | sha256sum -c -
          git apply --index .github/pr65-ais-fixture.patch
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/pr65-ais-fixture.patch
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Make AIS text fixture padding deterministic'
          git push origin HEAD:agent/signalk-schema-typed-view
