name: CI

on:
  push:
  pull_request:

jobs:
  sizeof:
    runs-on: ubuntu-latest
    steps:
      - name: Print data model sizes
        run: |
          git clone --quiet --depth 1 https://github.com/bareboat-necessities/signalk-mini.git /tmp/signalk-mini
          cd /tmp/signalk-mini
          cat > /tmp/sizeof_datamodel.cpp <<'CPP'
          #include <cstddef>
          #include <iostream>
          #include <ship_data_model.hpp>
          #include <signalk_mini/model_store.hpp>
          template<typename T>
          void print_size(const char* name) {
              std::cout << "SIZEOF " << name << " " << sizeof(T) << " ALIGN " << alignof(T) << "\n";
          }
          int main() {
              print_size<ship_data_model::DataModel<float>>("DataModel<float>");
              print_size<ship_data_model::DataModel<double>>("DataModel<double>");
              print_size<signalk_mini::ModelStore<float>>("ModelStore<float>");
              print_size<signalk_mini::ModelChange>("ModelChange");
              std::cout << "LIMIT DefaultModelChangeQueueCapacity " << signalk_mini::DefaultModelChangeQueueCapacity << "\n";
              std::cout << "LIMIT DefaultSignalKJsonBufferSize " << signalk_mini::DefaultSignalKJsonBufferSize << "\n";
              std::cout << "LIMIT DefaultSignalKBatchValues " << signalk_mini::DefaultSignalKBatchValues << "\n";
              return 0;
          }
          CPP
          g++ -std=c++17 -Isrc -Imodules/data-model/src /tmp/sizeof_datamodel.cpp -o /tmp/sizeof_datamodel
          /tmp/sizeof_datamodel

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev libconfig-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure

  arduino-atoms3r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib update-index
          arduino-cli lib install M5Unified
          arduino-cli lib install ArduinoJson
      - name: Prepare vendored module libraries
        run: |
          printf '%s\n' 'name=signalk-mini-async-event-loop' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored async event loop module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=async_event_loop.hpp' > modules/async-event-loop/library.properties
          printf '%s\n' 'name=signalk-mini-data-model' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored data model module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Data Processing' 'architectures=esp32' 'includes=ship_data_model.hpp' > modules/data-model/library.properties
          printf '%s\n' 'name=signalk-mini-nmea0183' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored NMEA0183 module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=nmea0183_connector.hpp' > modules/nmea0183/library.properties
          printf '%s\n' 'name=signalk-mini-seatalk' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored SeaTalk module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=seatalk.hpp' > modules/seatalk/library.properties
      - name: Compile AtomS3R sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --library . \
            --library modules/async-event-loop \
            --library modules/data-model \
            --library modules/nmea0183 \
            --library modules/seatalk \
            mcu/signalk-atoms3r
