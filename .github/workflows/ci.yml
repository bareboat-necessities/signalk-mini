name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.event_name == 'push' && github.ref == 'refs/heads/agent/signalk-schema-typed-view'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify and apply implementation
        shell: bash
        run: |
          set -euo pipefail
          cat .github/pr65-transfer/chunk-* > /tmp/pr65.patch.gz.b64
          echo 'f4f41ded9a9d5612d74dfcdbd1916002c25718356f2752bddf9fc005e2b70f5c  /tmp/pr65.patch.gz.b64' | sha256sum -c -
          base64 --decode /tmp/pr65.patch.gz.b64 > /tmp/pr65.patch.gz
          echo 'c39e0d166b2012a7977a0725ca7c0feb3d760d378e5832491655b0e868344042  /tmp/pr65.patch.gz' | sha256sum -c -
          gzip --decompress --stdout /tmp/pr65.patch.gz > /tmp/pr65.patch
          echo '932cdffdd2f072b334106e72a2e24e9a2e86692783285518d39c053735b89431  /tmp/pr65.patch' | sha256sum -c -
          git apply --index /tmp/pr65.patch
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -rf .github/pr65-transfer
          git add -A
          git diff --cached --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Correct Signal K schema and add typed store view'
          git push origin HEAD:agent/signalk-schema-typed-view
