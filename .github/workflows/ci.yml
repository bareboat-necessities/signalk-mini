name: Apply Signal K typed view

on:
  push:
    branches:
      - agent/signalk-schema-typed-view

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify and apply implementation
        shell: bash
        run: |
          set -euo pipefail
          cat \
            .github/pr65.patch.part00 \
            .github/pr65.patch.part01 \
            .github/pr65.patch.part02a \
            .github/pr65.patch.part02b \
            .github/pr65.patch.part03 \
            | base64 --decode > /tmp/pr65.patch.gz
          echo 'fb49a9462352e0bad48faab044b7030d00c52eda593f3d51cc93ef13cb0fa6ed  /tmp/pr65.patch.gz' | sha256sum --check --strict
          gzip --decompress --stdout /tmp/pr65.patch.gz > /tmp/pr65.patch
          git apply --check /tmp/pr65.patch
          git apply /tmp/pr65.patch
          rm -f .github/pr65.patch.part00 .github/pr65.patch.part01 \
                .github/pr65.patch.part02a .github/pr65.patch.part02b \
                .github/pr65.patch.part03
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Correct Signal K schema and add typed store view'
          git push origin HEAD:agent/signalk-schema-typed-view
