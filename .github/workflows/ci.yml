name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-websocket-limit-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/linux-websocket-large-subscriptions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/linux-websocket-large-subscriptions
          fetch-depth: 0
      - name: Apply bounded platform-specific WebSocket limit
        run: |
          python3 - <<'PY'
          from pathlib import Path

          websocket = Path('modules/async-event-loop/src/async_event_loop/websocket.hpp')
          text = websocket.read_text()
          old = 'static constexpr size_t DefaultMaxPayloadSize = 512;'
          new = '''#if defined(ARDUINO)
static constexpr size_t DefaultMaxPayloadSize = 512;
#else
static constexpr size_t DefaultMaxPayloadSize = 8192;
#endif'''
          if old not in text:
              raise SystemExit('WebSocket payload limit marker not found')
          websocket.write_text(text.replace(old, new, 1))

          test = Path('tests/test_websocket_codec.cpp')
          text = test.read_text()
          text = text.replace('#include <cstring>\n', '#include <cstring>\n#include <vector>\n', 1)
          marker = '''static void test_encode_server_text() {'''
          addition = r'''static void test_decode_boatinstrument_sized_subscription() {
    using namespace async_event_loop::websocket;
    constexpr size_t payload_len = 2048;
    REQUIRE(DefaultMaxPayloadSize >= payload_len);

    std::vector<uint8_t> payload(payload_len, 'x');
    const char prefix[] = "{\"context\":\"vessels.self\",\"subscribe\":[{\"path\":\"navigation.datetime\",\"policy\":\"instant\",\"minPeriod\":1000}],\"padding\":\"";
    REQUIRE(sizeof(prefix) - 1 < payload.size());
    std::memcpy(payload.data(), prefix, sizeof(prefix) - 1);
    payload.back() = '}';

    const uint8_t mask[4] = {0x12, 0x34, 0x56, 0x78};
    std::vector<uint8_t> frame(8 + payload.size());
    frame[0] = 0x81;
    frame[1] = 0x80 | 126;
    frame[2] = static_cast<uint8_t>((payload.size() >> 8) & 0xff);
    frame[3] = static_cast<uint8_t>(payload.size() & 0xff);
    std::memcpy(frame.data() + 4, mask, sizeof(mask));
    for (size_t i = 0; i < payload.size(); ++i) frame[8 + i] = payload[i] ^ mask[i & 3u];

    std::vector<uint8_t> decoded(DefaultMaxPayloadSize + 1);
    FrameView view;
    size_t consumed = 0;
    const auto result = decode_frame(frame.data(), frame.size(), decoded.data(), DefaultMaxPayloadSize, view, consumed, true);
    REQUIRE(result == FrameDecodeResult::Ok);
    REQUIRE(consumed == frame.size());
    REQUIRE(view.fin);
    REQUIRE(view.opcode == Opcode::Text);
    REQUIRE(view.payload_len == payload.size());
    REQUIRE(std::memcmp(view.payload, payload.data(), payload.size()) == 0);
}

'''
          if marker not in text:
              raise SystemExit('WebSocket codec test marker not found')
          text = text.replace(marker, addition + marker, 1)
          call = '    test_decode_masked_client_text();\n'
          if call not in text:
              raise SystemExit('WebSocket codec test call marker not found')
          text = text.replace(call, call + '    test_decode_boatinstrument_sized_subscription();\n', 1)
          test.write_text(text)
          PY
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Allow larger Linux WebSocket subscription frames"
          git push origin HEAD:fix/linux-websocket-large-subscriptions

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev libconfig-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload CTest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-diagnostics
          path: build/Testing/Temporary/
          if-no-files-found: ignore

  arduino-atoms3r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib update-index
          arduino-cli lib install M5Unified
          arduino-cli lib install ArduinoJson
      - name: Prepare vendored module libraries
        run: |
          printf '%s\n' 'name=signalk-mini-async-event-loop' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored async event loop module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=async_event_loop.hpp' > modules/async-event-loop/library.properties
          printf '%s\n' 'name=signalk-mini-data-model' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored data model module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Data Processing' 'architectures=esp32' 'includes=ship_data_model.hpp' > modules/data-model/library.properties
          printf '%s\n' 'name=signalk-mini-nmea0183' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored NMEA0183 module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=nmea0183_connector.hpp' > modules/nmea0183/library.properties
          printf '%s\n' 'name=signalk-mini-seatalk' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored SeaTalk module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=seatalk.hpp' > modules/seatalk/library.properties
      - name: Compile AtomS3R sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --library . \
            --library modules/async-event-loop \
            --library modules/data-model \
            --library modules/nmea0183 \
            --library modules/seatalk \
            mcu/signalk-atoms3r
