name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  vendor-sources:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Replace module gitlinks with actual copied sources
        shell: bash
        run: |
          set -euo pipefail

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          clone_src() {
            local repo="$1"
            local sha="$2"
            local dest="$3"
            git clone --quiet --filter=blob:none "$repo" "$work/src-repo"
            git -C "$work/src-repo" checkout --quiet "$sha"
            mkdir -p "$dest"
            cp -a "$work/src-repo/src/." "$dest/"
            rm -rf "$work/src-repo"
          }

          git rm -f --ignore-unmatch .gitmodules modules/async-event-loop modules/nmea0183 modules/data-model
          rm -rf modules/async-event-loop modules/nmea0183 modules/data-model .git/modules/async-event-loop .git/modules/nmea0183 .git/modules/data-model
          mkdir -p modules/async-event-loop/src modules/nmea0183/src modules/data-model/src

          clone_src https://github.com/bareboat-necessities/pypilot-event-loop.git 717b36585ef497a7cb22f1450042f0d65e81f282 modules/async-event-loop/src
          clone_src https://github.com/bareboat-necessities/pypilot-nmea0183-connector.git b2021b5a7b5db797375d8776a86595b8d77514af modules/nmea0183/src
          clone_src https://github.com/bareboat-necessities/pypilot-data-model.git 03267910f2df5707ee3c5e97169cbb230d26ab23 modules/data-model/src

          rm -rf fixtures
          rm -f SMALL_TEST_FILE.txt TEST_INLINE.txt TEST_DELETE_MARKER.txt

          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "replace module gitlinks with copied sources"
            git push
          fi

  linux:
    needs: vendor-sources
    if: always() && (github.event_name != 'push' || needs.vendor-sources.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
