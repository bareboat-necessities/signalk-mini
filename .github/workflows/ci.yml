name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  migrate-split-server:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Split signalk-mini headers and add server base
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p src/signalk_mini/json src/signalk_mini/net linux mcu/signalk-atoms3r tests

          cat > src/signalk_mini/types.hpp <<'EOF'
          #pragma once

          #include <stdint.h>

          namespace signalk_mini {

          using SourceId = uint16_t;

          inline uint16_t printable_error_code(int error_code) {
              return static_cast<uint16_t>(error_code < 0 ? -error_code : error_code);
          }

          enum class ModelField : uint16_t {
              None = 0,
              NavigationGpsFixLatDeg,
              NavigationGpsFixLonDeg,
              NavigationGpsSpeedKn,
              NavigationGpsTrackDeg,
              ImuHeadingDeg,
              WindApparentDirectionDeg,
              WindApparentSpeedKn,
              WaterDepthM,
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/config.hpp <<'EOF'
          #pragma once

          #include <stdint.h>

          namespace signalk_mini {

          struct SignalKMiniConfig {
              const char* host = "0.0.0.0";
              uint16_t signalk_port = 20223;
              uint16_t nmea0183_tcp_port = 20224;
              const char* source_label = "signalk-mini";
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/units.hpp <<'EOF'
          #pragma once

          namespace signalk_mini {

          template<typename Real>
          constexpr Real pi_v() {
              return static_cast<Real>(3.1415926535897932384626433832795L);
          }

          template<typename Real>
          constexpr Real deg_to_rad(Real deg) {
              return deg * pi_v<Real>() / static_cast<Real>(180);
          }

          template<typename Real>
          constexpr Real knots_to_mps(Real knots) {
              return knots * static_cast<Real>(0.51444444444444444444L);
          }

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/model_store.hpp <<'EOF'
          #pragma once

          #include <stddef.h>
          #include <stdint.h>

          #include <ship_data_model.hpp>
          #include "types.hpp"

          namespace signalk_mini {

          struct ModelChange {
              ModelField field = ModelField::None;
              SourceId source_id = 0;
              uint64_t timestamp_us = 0;
              uint64_t sequence = 0;
          };

          template<size_t Capacity>
          class ModelChangeQueue {
          public:
              bool push(const ModelChange& change) {
                  if (count_ == Capacity) {
                      tail_ = (tail_ + 1) % Capacity;
                      --count_;
                  }
                  items_[head_] = change;
                  head_ = (head_ + 1) % Capacity;
                  ++count_;
                  return true;
              }

              bool pop(ModelChange& change) {
                  if (count_ == 0) return false;
                  change = items_[tail_];
                  tail_ = (tail_ + 1) % Capacity;
                  --count_;
                  return true;
              }

              size_t size() const { return count_; }
              bool empty() const { return count_ == 0; }

          private:
              ModelChange items_[Capacity]{};
              size_t head_ = 0;
              size_t tail_ = 0;
              size_t count_ = 0;
          };

          template<typename Real, size_t QueueCapacity = 128>
          class ModelStore {
          public:
              using Model = ship_data_model::DataModel<Real>;

              Model& model() { return model_; }
              const Model& model() const { return model_; }

              ModelChangeQueue<QueueCapacity>& changes() { return changes_; }
              uint64_t sequence() const { return sequence_; }

              void mark_changed(ModelField field, SourceId source_id, uint64_t now_us) {
                  ModelChange change;
                  change.field = field;
                  change.source_id = source_id;
                  change.timestamp_us = now_us;
                  change.sequence = ++sequence_;
                  changes_.push(change);
              }

          private:
              Model model_{};
              ModelChangeQueue<QueueCapacity> changes_{};
              uint64_t sequence_ = 0;
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/nmea0183_input.hpp <<'EOF'
          #pragma once

          #include <stdint.h>

          #include <nmea0183_connector.hpp>
          #include <ship_data_model.hpp>

          #include "model_store.hpp"
          #include "types.hpp"

          namespace signalk_mini {

          template<typename Real>
          class Nmea0183Input {
          public:
              explicit Nmea0183Input(ModelStore<Real>& store) : store_(store) {}

              bool feed_line(const char* line, SourceId source_id, uint64_t now_us) {
                  nmea0183_connector::NmeaSentence sentence;
                  if (!parser_.parse_line(line, sentence)) return false;

                  const bool applied = rx_.apply_sentence(
                      sentence,
                      store_.model(),
                      now_us,
                      ship_data_model::SensorSource::serial
                  );
                  if (!applied) return false;

                  mark_changed_from_sentence(sentence, source_id, now_us);
                  return true;
              }

              const char* last_error() const { return rx_.last_error(); }

          private:
              void mark_changed_from_sentence(const nmea0183_connector::NmeaSentence& sentence,
                                              SourceId source_id,
                                              uint64_t now_us) {
                  if (nmea0183_connector::sentence_is(sentence, "RMC") ||
                      nmea0183_connector::sentence_is(sentence, "GGA") ||
                      nmea0183_connector::sentence_is(sentence, "GLL")) {
                      store_.mark_changed(ModelField::NavigationGpsFixLatDeg, source_id, now_us);
                      store_.mark_changed(ModelField::NavigationGpsFixLonDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "RMC") ||
                      nmea0183_connector::sentence_is(sentence, "VTG")) {
                      store_.mark_changed(ModelField::NavigationGpsSpeedKn, source_id, now_us);
                      store_.mark_changed(ModelField::NavigationGpsTrackDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "HDT") ||
                      nmea0183_connector::sentence_is(sentence, "HDM") ||
                      nmea0183_connector::sentence_is(sentence, "HDG")) {
                      store_.mark_changed(ModelField::ImuHeadingDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "MWV") ||
                      nmea0183_connector::sentence_is(sentence, "MWD") ||
                      nmea0183_connector::sentence_is(sentence, "VWR")) {
                      store_.mark_changed(ModelField::WindApparentDirectionDeg, source_id, now_us);
                      store_.mark_changed(ModelField::WindApparentSpeedKn, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "DBT") ||
                      nmea0183_connector::sentence_is(sentence, "DPT")) {
                      store_.mark_changed(ModelField::WaterDepthM, source_id, now_us);
                  }
              }

              ModelStore<Real>& store_;
              nmea0183_connector::Nmea0183StreamParser parser_;
              nmea0183_connector::Nmea0183RxConnector<Real> rx_;
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/signalk_mapper.hpp <<'EOF'
          #pragma once

          #include <ship_data_model.hpp>

          #include "model_store.hpp"
          #include "units.hpp"

          namespace signalk_mini {

          template<typename Real>
          struct SignalKMappedValue {
              const char* path = nullptr;
              Real number{};
          };

          template<typename Real>
          class SignalKMapper {
          public:
              bool map_change(const ship_data_model::DataModel<Real>& model,
                              const ModelChange& change,
                              SignalKMappedValue<Real>& out) const {
                  switch (change.field) {
                  case ModelField::NavigationGpsFixLatDeg:
                      out.path = "navigation.position.value.latitude";
                      out.number = model.navigation.gps.fix_lat_deg.value;
                      return model.navigation.gps.fix_lat_deg.valid;
                  case ModelField::NavigationGpsFixLonDeg:
                      out.path = "navigation.position.value.longitude";
                      out.number = model.navigation.gps.fix_lon_deg.value;
                      return model.navigation.gps.fix_lon_deg.valid;
                  case ModelField::NavigationGpsSpeedKn:
                      out.path = "navigation.speedOverGround";
                      out.number = knots_to_mps<Real>(model.navigation.gps.speed_kn.value);
                      return model.navigation.gps.speed_kn.valid;
                  case ModelField::NavigationGpsTrackDeg:
                      out.path = "navigation.courseOverGroundTrue";
                      out.number = deg_to_rad<Real>(model.navigation.gps.track_deg.value);
                      return model.navigation.gps.track_deg.valid;
                  case ModelField::ImuHeadingDeg:
                      out.path = "navigation.headingTrue";
                      out.number = deg_to_rad<Real>(model.imu.heading_deg.value);
                      return model.imu.heading_deg.valid;
                  case ModelField::WindApparentDirectionDeg:
                      out.path = "environment.wind.angleApparent";
                      out.number = deg_to_rad<Real>(model.wind.apparent.direction_deg.value);
                      return model.wind.apparent.direction_deg.valid;
                  case ModelField::WindApparentSpeedKn:
                      out.path = "environment.wind.speedApparent";
                      out.number = knots_to_mps<Real>(model.wind.apparent.speed_kn.value);
                      return model.wind.apparent.speed_kn.valid;
                  case ModelField::WaterDepthM:
                      out.path = "environment.depth.belowTransducer";
                      out.number = model.water.depth_m.value;
                      return model.water.depth_m.valid;
                  default:
                      return false;
                  }
              }
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/json/signalk_delta_writer.hpp <<'EOF'
          #pragma once

          #include <stddef.h>
          #include <stdio.h>
          #include <string.h>

          #if defined(SIGNALK_MINI_HAS_ARDUINOJSON)
          #include <ArduinoJson.h>
          #endif

          #include "../signalk_mapper.hpp"

          namespace signalk_mini {

          template<typename Real>
          class SignalKDeltaWriter {
          public:
              int write_number(char* dst, size_t dst_size, const char* source_label, const char* path, Real value) const {
                  if (!dst || dst_size == 0 || !path) return 0;
          #if defined(SIGNALK_MINI_HAS_ARDUINOJSON)
                  JsonDocument doc;
                  JsonArray updates = doc["updates"].to<JsonArray>();
                  JsonObject update = updates.add<JsonObject>();
                  JsonObject source = update["source"].to<JsonObject>();
                  source["label"] = source_label ? source_label : "signalk-mini";
                  JsonArray values = update["values"].to<JsonArray>();
                  JsonObject item = values.add<JsonObject>();
                  item["path"] = path;
                  item["value"] = value;
                  const size_t len = serializeJson(doc, dst, dst_size);
                  if (len + 2 >= dst_size) return 0;
                  dst[len] = '\r';
                  dst[len + 1] = '\n';
                  dst[len + 2] = '\0';
                  return static_cast<int>(len + 2);
          #else
                  return snprintf(dst, dst_size,
                      "{\"updates\":[{\"source\":{\"label\":\"%s\"},\"values\":[{\"path\":\"%s\",\"value\":%.9g}]}]}\r\n",
                      source_label ? source_label : "signalk-mini", path, static_cast<double>(value));
          #endif
              }

              int write_mapped(char* dst, size_t dst_size, const char* source_label, const SignalKMappedValue<Real>& value) const {
                  return write_number(dst, dst_size, source_label, value.path, value.number);
              }
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/publisher.hpp <<'EOF'
          #pragma once

          #include <stddef.h>
          #include <stdint.h>

          #include <async_event_loop.hpp>

          #include "config.hpp"
          #include "json/signalk_delta_writer.hpp"
          #include "model_store.hpp"
          #include "signalk_mapper.hpp"

          namespace signalk_mini {

          template<typename Real>
          class SignalKPublisher {
          public:
              SignalKPublisher(ModelStore<Real>& store, const SignalKMiniConfig& config)
                  : store_(store), config_(config) {}

              template<typename ClientRegistry>
              void publish_pending(ClientRegistry& clients) {
                  SignalKMapper<Real> mapper;
                  SignalKDeltaWriter<Real> writer;
                  ModelChange change;
                  size_t emitted = 0;
                  while (emitted < max_changes_per_tick && store_.changes().pop(change)) {
                      SignalKMappedValue<Real> mapped;
                      if (!mapper.map_change(store_.model(), change, mapped) || !mapped.path) continue;
                      char json[json_buffer_size];
                      const int len = writer.write_mapped(json, sizeof(json), config_.source_label, mapped);
                      if (len <= 0 || static_cast<size_t>(len) >= sizeof(json)) continue;
                      clients.for_each([&](async_event_loop::ITcpConnection& peer) {
                          peer.write(reinterpret_cast<const uint8_t*>(json), static_cast<size_t>(len));
                      });
                      ++emitted;
                  }
              }

              static constexpr size_t json_buffer_size = 512;
              static constexpr size_t max_changes_per_tick = 32;

          private:
              ModelStore<Real>& store_;
              const SignalKMiniConfig& config_;
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/app.hpp <<'EOF'
          #pragma once

          #include "model_store.hpp"
          #include "nmea0183_input.hpp"

          namespace signalk_mini {

          template<typename Real = float>
          class SignalKMiniApp {
          public:
              using Store = ModelStore<Real>;
              Store& store() { return store_; }
              const Store& store() const { return store_; }
              Nmea0183Input<Real>& nmea0183() { return nmea0183_; }

          private:
              Store store_{};
              Nmea0183Input<Real> nmea0183_{store_};
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini/server.hpp <<'EOF'
          #pragma once

          #include <stddef.h>
          #include <stdint.h>

          #if defined(ARDUINO)
          #define ASYNC_EVENT_LOOP_ENABLE_ARDUINO_WIFI_TCP
          #endif

          #include <async_event_loop.hpp>

          #include "config.hpp"
          #include "model_store.hpp"
          #include "nmea0183_input.hpp"
          #include "publisher.hpp"
          #include "types.hpp"

          namespace signalk_mini {

          template<typename Real, size_t MaxSignalKClients = 8, size_t MaxNmeaSources = 4>
          class MiniSignalKServer {
          public:
              using Loop = async_event_loop::EventLoop<>;

              explicit MiniSignalKServer(const SignalKMiniConfig& config = SignalKMiniConfig{})
                  : config_(config), signalk_server_(event_loop_.scheduler()), nmea_server_(event_loop_.scheduler()),
                    publisher_(store_, config_), signalk_callbacks_(*this), nmea_callbacks_(*this),
                    signalk_handler_(signalk_callbacks_, make_signalk_options()),
                    nmea_handler_(nmea_callbacks_, async_event_loop::TcpLineServerOptions{}) {}

              bool valid() const { return event_loop_.valid(); }
              Loop& event_loop() { return event_loop_; }
              ModelStore<Real>& store() { return store_; }
              Nmea0183Input<Real>& nmea0183() { return nmea0183_; }

              bool begin() {
                  if (!event_loop_.valid()) return false;
                  if (!listen_server(signalk_server_, signalk_handler_, config_.signalk_port)) return false;
                  if (!listen_server(nmea_server_, nmea_handler_, config_.nmea0183_tcp_port)) {
                      signalk_server_.close();
                      return false;
                  }
                  publish_timer_ = event_loop_.on_repeat_us(10000ULL, [this]() { publish_tick(); });
                  return static_cast<bool>(publish_timer_);
              }

              void tick() { event_loop_.tick(); }
              void run_forever() { event_loop_.run_forever(); }
              size_t signalk_client_count() const { return signalk_callbacks_.clients.size(); }
              size_t nmea_source_count() const { return nmea_callbacks_.sources.size(); }

          private:
              static async_event_loop::TcpLineServerOptions make_signalk_options() {
                  async_event_loop::TcpLineServerOptions options;
          #if defined(ARDUINO)
                  options.backpressure = async_event_loop::TcpBackpressureOptions::embedded_default();
          #else
                  options.backpressure = async_event_loop::TcpBackpressureOptions::server_default();
          #endif
                  return options;
              }

              bool listen_server(async_event_loop::NativeTcpServer& tcp_server,
                                 async_event_loop::ITcpServerHandler& handler,
                                 uint16_t port) {
                  async_event_loop::TcpListenOptions options;
                  options.host = config_.host;
                  options.port = port;
                  options.reuse_address = true;
                  return tcp_server.listen(options, handler);
              }

              void publish_tick() { publisher_.publish_pending(signalk_callbacks_.clients); }

              struct SignalKCallbacks final : public async_event_loop::ITcpLineServerHandler {
                  explicit SignalKCallbacks(MiniSignalKServer& owner_ref) : owner(owner_ref) {}
                  MiniSignalKServer& owner;
                  async_event_loop::TcpConnectionRegistry<MaxSignalKClients> clients;
                  int accepted = 0;
                  int incoming_lines = 0;
                  int backpressure_disconnects = 0;

                  void on_accept(async_event_loop::ITcpConnection& connection, const async_event_loop::TcpPeerInfo&) override {
                      if (!clients.add(connection)) { connection.close(); return; }
                      ++accepted;
                  }
                  void on_line(async_event_loop::ITcpConnection& connection, async_event_loop::LineView line) override {
                      (void)connection; (void)line; ++incoming_lines;
                  }
                  void on_backpressure(async_event_loop::ITcpConnection& connection, const async_event_loop::TcpBackpressureInfo&) override {
                      ++backpressure_disconnects; clients.remove(connection);
                  }
                  void on_close(async_event_loop::ITcpConnection& connection) override { clients.remove(connection); }
                  void on_error(async_event_loop::ITcpConnection& connection, int) override { clients.remove(connection); }
                  void on_too_many_connections(async_event_loop::ITcpConnection& connection) override { connection.close(); }
              };

              struct NmeaCallbacks final : public async_event_loop::ITcpLineServerHandler {
                  explicit NmeaCallbacks(MiniSignalKServer& owner_ref) : owner(owner_ref) {}
                  MiniSignalKServer& owner;
                  async_event_loop::TcpConnectionRegistry<MaxNmeaSources> sources;
                  int accepted = 0;
                  int updates = 0;

                  void on_accept(async_event_loop::ITcpConnection& connection, const async_event_loop::TcpPeerInfo&) override {
                      if (!sources.add(connection)) { connection.close(); return; }
                      ++accepted;
                  }
                  void on_line(async_event_loop::ITcpConnection& connection, async_event_loop::LineView line) override {
                      (void)connection;
                      char text[160];
                      async_event_loop::line_to_cstr(line, text);
                      if (owner.nmea0183_.feed_line(text, SourceId(1), owner.event_loop_.clock().micros())) {
                          ++updates;
                          owner.publish_tick();
                      }
                  }
                  void on_close(async_event_loop::ITcpConnection& connection) override { sources.remove(connection); }
                  void on_error(async_event_loop::ITcpConnection& connection, int) override { sources.remove(connection); }
                  void on_too_many_connections(async_event_loop::ITcpConnection& connection) override { connection.close(); }
              };

              SignalKMiniConfig config_;
              Loop event_loop_;
              async_event_loop::NativeTcpServer signalk_server_;
              async_event_loop::NativeTcpServer nmea_server_;
              ModelStore<Real> store_{};
              Nmea0183Input<Real> nmea0183_{store_};
              SignalKPublisher<Real> publisher_;
              SignalKCallbacks signalk_callbacks_;
              NmeaCallbacks nmea_callbacks_;
              async_event_loop::TcpLineServerHandler<256, MaxSignalKClients> signalk_handler_;
              async_event_loop::TcpLineServerHandler<192, MaxNmeaSources> nmea_handler_;
              async_event_loop::EventHandle publish_timer_{};
          };

          } // namespace signalk_mini
          EOF

          cat > src/signalk_mini.hpp <<'EOF'
          #pragma once

          #include "signalk_mini/config.hpp"
          #include "signalk_mini/types.hpp"
          #include "signalk_mini/units.hpp"
          #include "signalk_mini/model_store.hpp"
          #include "signalk_mini/nmea0183_input.hpp"
          #include "signalk_mini/signalk_mapper.hpp"
          #include "signalk_mini/json/signalk_delta_writer.hpp"
          #include "signalk_mini/app.hpp"

          #if defined(SIGNALK_MINI_ENABLE_NATIVE_TCP) || defined(ARDUINO)
          #include "signalk_mini/publisher.hpp"
          #include "signalk_mini/server.hpp"
          #endif
          EOF

          cat > linux/main.cpp <<'EOF'
          #include <iostream>
          #include <string>
          #include <signalk_mini.hpp>

          int main() {
          #if defined(SIGNALK_MINI_ENABLE_NATIVE_TCP)
              signalk_mini::SignalKMiniConfig config;
              signalk_mini::MiniSignalKServer<float> server(config);
              if (!server.begin()) return 2;
              server.run_forever();
              return 0;
          #else
              signalk_mini::SignalKMiniApp<float> app;
              std::string line;
              uint64_t now_us = 0;
              while (std::getline(std::cin, line)) {
                  now_us += 100000;
                  app.nmea0183().feed_line(line.c_str(), 1, now_us);
              }
              std::cout << "changes=" << app.store().sequence() << "\n";
              return 0;
          #endif
          }
          EOF

          cat > mcu/signalk-atoms3r/signalk-atoms3r.ino <<'EOF'
          #define ASYNC_EVENT_LOOP_ENABLE_ARDUINO_WIFI_TCP
          #include <Arduino.h>
          #include <async_event_loop_arduino/arduino_wifi.hpp>
          #include <signalk_mini/server.hpp>

          #ifndef SIGNALK_MINI_WIFI_SSID
          #define SIGNALK_MINI_WIFI_SSID "ssid"
          #endif
          #ifndef SIGNALK_MINI_WIFI_PASSWORD
          #define SIGNALK_MINI_WIFI_PASSWORD "password"
          #endif
          #ifndef SIGNALK_MINI_WIFI_CONNECT_TIMEOUT_MS
          #define SIGNALK_MINI_WIFI_CONNECT_TIMEOUT_MS 15000UL
          #endif

          signalk_mini::SignalKMiniConfig config;
          signalk_mini::MiniSignalKServer<float> app(config);
          bool setup_failed = false;

          void setup() {
            Serial.begin(115200);
            const async_event_loop::WiFiConnectResult wifi = async_event_loop::connect_wifi_result(
                SIGNALK_MINI_WIFI_SSID, SIGNALK_MINI_WIFI_PASSWORD, SIGNALK_MINI_WIFI_CONNECT_TIMEOUT_MS);
            if (wifi != async_event_loop::WiFiConnectResult::Connected) {
              Serial.println(async_event_loop::wifi_connect_result_text(wifi));
              setup_failed = true;
              return;
            }
            if (!app.begin()) {
              Serial.println("signalk-mini setup failed");
              setup_failed = true;
            }
          }

          void loop() {
            if (setup_failed) { delay(1000); return; }
            app.tick();
          }
          EOF

          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(signalk-mini VERSION 0.1.0 LANGUAGES CXX)

          option(SIGNALK_MINI_FETCH_ARDUINOJSON "Fetch ArduinoJson v7 for protocol boundary" ON)

          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          find_package(PkgConfig)
          if(PkgConfig_FOUND)
            pkg_check_modules(LIBEVENT libevent)
          endif()

          add_library(signalk_mini_core INTERFACE)
          target_include_directories(signalk_mini_core INTERFACE
            ${CMAKE_CURRENT_SOURCE_DIR}/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/async-event-loop/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/data-model/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/nmea0183/src
          )
          target_compile_features(signalk_mini_core INTERFACE cxx_std_17)

          if(LIBEVENT_FOUND)
            target_include_directories(signalk_mini_core INTERFACE ${LIBEVENT_INCLUDE_DIRS})
            target_link_directories(signalk_mini_core INTERFACE ${LIBEVENT_LIBRARY_DIRS})
            target_link_libraries(signalk_mini_core INTERFACE ${LIBEVENT_LIBRARIES})
            target_compile_options(signalk_mini_core INTERFACE ${LIBEVENT_CFLAGS_OTHER})
            target_compile_definitions(signalk_mini_core INTERFACE SIGNALK_MINI_ENABLE_NATIVE_TCP=1)
          else()
            message(STATUS "libevent not found; native TCP server build falls back to stdin smoke executable")
          endif()

          if(SIGNALK_MINI_FETCH_ARDUINOJSON)
            include(FetchContent)
            FetchContent_Declare(ArduinoJson GIT_REPOSITORY https://github.com/bblanchon/ArduinoJson.git GIT_TAG v7.4.3)
            FetchContent_MakeAvailable(ArduinoJson)
            target_link_libraries(signalk_mini_core INTERFACE ArduinoJson)
            target_compile_definitions(signalk_mini_core INTERFACE SIGNALK_MINI_HAS_ARDUINOJSON=1)
          endif()

          add_executable(signalk-mini linux/main.cpp)
          target_link_libraries(signalk-mini PRIVATE signalk_mini_core)

          include(CTest)
          if(BUILD_TESTING)
            add_executable(test_signalk_mini_smoke tests/test_signalk_mini_smoke.cpp)
            target_link_libraries(test_signalk_mini_smoke PRIVATE signalk_mini_core)
            add_test(NAME test_signalk_mini_smoke COMMAND test_signalk_mini_smoke)
          endif()
          EOF

          cat > README.md <<'EOF'
          # signalk-mini

          Lightweight low-latency C++ Signal K mini server for Arduino and Linux.

          This stage vendors the actual uploaded source modules as source copies under stable module names:

          - `modules/async-event-loop/src`
          - `modules/nmea0183/src`
          - `modules/data-model/src`

          Only module sources are copied. The imported module tests, examples, docs, workflows, and package metadata are intentionally not copied into `modules/`.

          The `MiniSignalKServerExample.ino` design has been moved into the real project code instead of left as an external example. The server base now uses the same core pattern:

          - one single-threaded event loop
          - one Signal K TCP listener for subscribers
          - one NMEA0183 TCP listener for line-delimited NMEA sources
          - fixed TCP connection registries
          - Signal K backpressure detection and disconnects
          - NMEA line callbacks updating the typed model
          - a publisher draining model changes and broadcasting Signal K deltas

          The public umbrella header is now small. Implementation is split into focused headers:

          - `signalk_mini/config.hpp`
          - `signalk_mini/types.hpp`
          - `signalk_mini/units.hpp`
          - `signalk_mini/model_store.hpp`
          - `signalk_mini/nmea0183_input.hpp`
          - `signalk_mini/signalk_mapper.hpp`
          - `signalk_mini/json/signalk_delta_writer.hpp`
          - `signalk_mini/publisher.hpp`
          - `signalk_mini/app.hpp`
          - `signalk_mini/server.hpp`

          Project direction:

          - single-threaded event-loop architecture
          - strongly typed internal data model, not Signal K as store
          - Signal K as an output adapter layer
          - `template<typename Real>` through core paths, with `float` as the default instantiation
          - unit suffixes preserved in data model field names
          - ArduinoJson v7 at the JSON/config/protocol boundary

          ## Build

          ```bash
          cmake -S . -B build -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure
          ```

          When `libevent-dev` is installed on Linux, the `signalk-mini` executable builds the TCP server. Without libevent headers, the same target falls back to a stdin smoke executable so core model/NMEA mapping can still be tested.

          ## TCP ports

          Default ports match the original mini example:

          - Signal K subscribers: `20223`
          - NMEA0183 TCP sources: `20224`
          EOF

          cat > .github/workflows/ci.yml <<'EOF'
          name: CI

          on:
            push:
            pull_request:

          jobs:
            linux:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Install native TCP dependency
                  run: sudo apt-get update && sudo apt-get install -y libevent-dev pkg-config
                - name: Configure
                  run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
                - name: Build
                  run: cmake --build build --parallel
                - name: Test
                  run: ctest --test-dir build --output-on-failure

            linux-with-arduinojson:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - name: Install native TCP dependency
                  run: sudo apt-get update && sudo apt-get install -y libevent-dev pkg-config
                - name: Configure
                  run: cmake -S . -B build-json -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=ON
                - name: Build
                  run: cmake --build build-json --parallel
                - name: Test
                  run: ctest --test-dir build-json --output-on-failure
          EOF

          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

          if ! git diff --quiet || ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "split signalk mini headers and add server base"
            git push
          fi

  linux:
    needs: migrate-split-server
    if: always() && (github.event_name != 'push' || needs.migrate-split-server.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native TCP dependency
        run: sudo apt-get update && sudo apt-get install -y libevent-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
