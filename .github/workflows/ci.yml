name: CI

on:
  push:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Archive source
        run: tar --exclude=.git -czf /tmp/signalk-mini-pr78-source.tar.gz .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: signalk-mini-pr78-source
          path: /tmp/signalk-mini-pr78-source.tar.gz
