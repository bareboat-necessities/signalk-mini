name: CI

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write

jobs:
  apply-http-test-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/signalk-http-discovery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/signalk-http-discovery
          fetch-depth: 0
      - name: Apply correction once
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('tests/test_signalk_mini_websocket_integration.cpp')
          s = p.read_text()
          old = '''        if (n == 0) return response.find("\\r\\n\\r\\n") != std::string::npos;
        response.append(chunk, static_cast<size_t>(n));
    }
    return false;
}'''
          new = '''        if (n == 0) return response.find("\\r\\n\\r\\n") != std::string::npos;
        response.append(chunk, static_cast<size_t>(n));

        const size_t header_end = response.find("\\r\\n\\r\\n");
        if (header_end == std::string::npos) continue;
        const size_t content_length_pos = response.find("Content-Length:");
        if (content_length_pos == std::string::npos || content_length_pos > header_end) return true;
        size_t value = content_length_pos + std::strlen("Content-Length:");
        while (value < header_end && (response[value] == ' ' || response[value] == '\\t')) ++value;
        size_t body_length = 0;
        while (value < header_end && response[value] >= '0' && response[value] <= '9') {
            body_length = body_length * 10u + static_cast<size_t>(response[value] - '0');
            ++value;
        }
        if (response.size() >= header_end + 4u + body_length) return true;
    }
    return false;
}'''
          if old not in s:
              raise SystemExit('HTTP response helper marker not found')
          p.write_text(s.replace(old, new, 1))
          PY
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/fix-http-response-test.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete HTTP tests from Content-Length"
          git push origin HEAD:fix/signalk-http-discovery

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev libconfig-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload CTest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-diagnostics
          path: build/Testing/Temporary/
          if-no-files-found: ignore

  arduino-atoms3r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib update-index
          arduino-cli lib install M5Unified
          arduino-cli lib install ArduinoJson
      - name: Prepare vendored module libraries
        run: |
          printf '%s\n' 'name=signalk-mini-async-event-loop' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored async event loop module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=async_event_loop.hpp' > modules/async-event-loop/library.properties
          printf '%s\n' 'name=signalk-mini-data-model' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored data model module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Data Processing' 'architectures=esp32' 'includes=ship_data_model.hpp' > modules/data-model/library.properties
          printf '%s\n' 'name=signalk-mini-nmea0183' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored NMEA0183 module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=nmea0183_connector.hpp' > modules/nmea0183/library.properties
          printf '%s\n' 'name=signalk-mini-seatalk' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored SeaTalk module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=seatalk.hpp' > modules/seatalk/library.properties
      - name: Compile AtomS3R sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --library . \
            --library modules/async-event-loop \
            --library modules/data-model \
            --library modules/nmea0183 \
            --library modules/seatalk \
            mcu/signalk-atoms3r
