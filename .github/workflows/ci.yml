name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  vendor-sources:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Vendor actual source modules
        shell: bash
        run: |
          set -euo pipefail

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          clone_src() {
            local repo="$1"
            local sha="$2"
            local dest="$3"
            git clone --quiet --filter=blob:none "$repo" "$work/src-repo"
            git -C "$work/src-repo" checkout --quiet "$sha"
            mkdir -p "$dest"
            cp -a "$work/src-repo/src/." "$dest/"
            rm -rf "$work/src-repo"
          }

          rm -rf modules/async-event-loop modules/nmea0183 modules/data-model
          mkdir -p modules/async-event-loop/src modules/nmea0183/src modules/data-model/src

          clone_src https://github.com/bareboat-necessities/pypilot-event-loop.git 717b36585ef497a7cb22f1450042f0d65e81f282 modules/async-event-loop/src
          clone_src https://github.com/bareboat-necessities/pypilot-nmea0183-connector.git b2021b5a7b5db797375d8776a86595b8d77514af modules/nmea0183/src
          clone_src https://github.com/bareboat-necessities/pypilot-data-model.git 03267910f2df5707ee3c5e97169cbb230d26ab23 modules/data-model/src

          rm -rf fixtures
          rm -f SMALL_TEST_FILE.txt TEST_INLINE.txt TEST_DELETE_MARKER.txt
          mkdir -p src linux tests mcu/signalk-atoms3r

          cat > .gitignore <<'EOF'
          build*/
          .vscode/
          .idea/
          *.o
          *.a
          *.so
          *.exe
          .DS_Store
          EOF

          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(signalk-mini VERSION 0.1.0 LANGUAGES CXX)

          option(SIGNALK_MINI_FETCH_ARDUINOJSON "Fetch ArduinoJson v7 for protocol boundary" ON)

          set(CMAKE_CXX_STANDARD 11)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          set(CMAKE_CXX_EXTENSIONS OFF)

          add_library(signalk_mini_core INTERFACE)
          target_include_directories(signalk_mini_core INTERFACE
            ${CMAKE_CURRENT_SOURCE_DIR}/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/async-event-loop/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/data-model/src
            ${CMAKE_CURRENT_SOURCE_DIR}/modules/nmea0183/src
          )
          target_compile_features(signalk_mini_core INTERFACE cxx_std_11)

          if(SIGNALK_MINI_FETCH_ARDUINOJSON)
            include(FetchContent)
            FetchContent_Declare(
              ArduinoJson
              GIT_REPOSITORY https://github.com/bblanchon/ArduinoJson.git
              GIT_TAG v7.4.3
            )
            FetchContent_MakeAvailable(ArduinoJson)
            target_link_libraries(signalk_mini_core INTERFACE ArduinoJson)
          endif()

          add_executable(signalk-mini linux/main.cpp)
          target_link_libraries(signalk-mini PRIVATE signalk_mini_core)

          include(CTest)
          if(BUILD_TESTING)
            add_executable(test_signalk_mini_smoke tests/test_signalk_mini_smoke.cpp)
            target_link_libraries(test_signalk_mini_smoke PRIVATE signalk_mini_core)
            add_test(NAME test_signalk_mini_smoke COMMAND test_signalk_mini_smoke)
          endif()
          EOF

          cat > README.md <<'EOF'
          # signalk-mini

          Lightweight low-latency C++ Signal K mini server for Arduino and Linux.

          This stage vendors the actual uploaded source modules as source copies under stable module names:

          - `modules/async-event-loop/src`
          - `modules/nmea0183/src`
          - `modules/data-model/src`

          Only module sources are copied. The imported module tests, examples, docs, workflows, and package metadata are intentionally not copied into `modules/`.

          Project direction:

          - single-threaded event-loop architecture
          - strongly typed internal data model, not Signal K as store
          - Signal K as an output adapter layer
          - `template<typename Real>` through core paths, with `float` as the default instantiation
          - unit suffixes preserved in data model field names
          - ArduinoJson v7 at the JSON/config/protocol boundary

          Current smoke build verifies that NMEA0183 input updates the typed data model and that the Signal K mapper can map model changes to Signal K paths. It is not the final server implementation yet.

          ## Build

          ```bash
          cmake -S . -B build -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure
          ```
          EOF

          cat > src/signalk_mini.hpp <<'EOF'
          #pragma once

          #include <stdint.h>
          #include <stddef.h>

          #include <ship_data_model.hpp>
          #include <nmea0183_connector.hpp>

          namespace signalk_mini {

          using SourceId = uint16_t;

          enum class ModelField : uint16_t {
              None = 0,
              NavigationGpsFixLatDeg,
              NavigationGpsFixLonDeg,
              NavigationGpsSpeedKn,
              NavigationGpsTrackDeg,
              ImuHeadingDeg,
              WindApparentDirectionDeg,
              WindApparentSpeedKn,
              WaterDepthM,
          };

          struct ModelChange {
              ModelField field = ModelField::None;
              SourceId source_id = 0;
              uint64_t timestamp_us = 0;
              uint64_t sequence = 0;
          };

          template<size_t Capacity>
          class ModelChangeQueue {
          public:
              bool push(const ModelChange& change) {
                  if (count_ == Capacity) {
                      tail_ = (tail_ + 1) % Capacity;
                      --count_;
                  }
                  items_[head_] = change;
                  head_ = (head_ + 1) % Capacity;
                  ++count_;
                  return true;
              }

              bool pop(ModelChange& change) {
                  if (count_ == 0) return false;
                  change = items_[tail_];
                  tail_ = (tail_ + 1) % Capacity;
                  --count_;
                  return true;
              }

              size_t size() const { return count_; }

          private:
              ModelChange items_[Capacity]{};
              size_t head_ = 0;
              size_t tail_ = 0;
              size_t count_ = 0;
          };

          template<typename Real, size_t QueueCapacity = 128>
          class ModelStore {
          public:
              using Model = ship_data_model::DataModel<Real>;

              Model& model() { return model_; }
              const Model& model() const { return model_; }

              ModelChangeQueue<QueueCapacity>& changes() { return changes_; }
              uint64_t sequence() const { return sequence_; }

              void mark_changed(ModelField field, SourceId source_id, uint64_t now_us) {
                  ModelChange change;
                  change.field = field;
                  change.source_id = source_id;
                  change.timestamp_us = now_us;
                  change.sequence = ++sequence_;
                  changes_.push(change);
              }

          private:
              Model model_{};
              ModelChangeQueue<QueueCapacity> changes_{};
              uint64_t sequence_ = 0;
          };

          template<typename Real>
          class Nmea0183Input {
          public:
              explicit Nmea0183Input(ModelStore<Real>& store) : store_(store) {}

              bool feed_line(const char* line, SourceId source_id, uint64_t now_us) {
                  nmea0183_connector::NmeaSentence sentence;
                  if (!parser_.parse_line(line, sentence)) return false;

                  const bool applied = rx_.apply_sentence(
                      sentence,
                      store_.model(),
                      now_us,
                      ship_data_model::SensorSource::serial
                  );
                  if (!applied) return false;

                  mark_changed_from_sentence(sentence, source_id, now_us);
                  return true;
              }

              const char* last_error() const { return rx_.last_error(); }

          private:
              void mark_changed_from_sentence(const nmea0183_connector::NmeaSentence& sentence, SourceId source_id, uint64_t now_us) {
                  if (nmea0183_connector::sentence_is(sentence, "RMC") ||
                      nmea0183_connector::sentence_is(sentence, "GGA") ||
                      nmea0183_connector::sentence_is(sentence, "GLL")) {
                      store_.mark_changed(ModelField::NavigationGpsFixLatDeg, source_id, now_us);
                      store_.mark_changed(ModelField::NavigationGpsFixLonDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "RMC") ||
                      nmea0183_connector::sentence_is(sentence, "VTG")) {
                      store_.mark_changed(ModelField::NavigationGpsSpeedKn, source_id, now_us);
                      store_.mark_changed(ModelField::NavigationGpsTrackDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "HDT") ||
                      nmea0183_connector::sentence_is(sentence, "HDM") ||
                      nmea0183_connector::sentence_is(sentence, "HDG")) {
                      store_.mark_changed(ModelField::ImuHeadingDeg, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "MWV") ||
                      nmea0183_connector::sentence_is(sentence, "MWD") ||
                      nmea0183_connector::sentence_is(sentence, "VWR")) {
                      store_.mark_changed(ModelField::WindApparentDirectionDeg, source_id, now_us);
                      store_.mark_changed(ModelField::WindApparentSpeedKn, source_id, now_us);
                  }
                  if (nmea0183_connector::sentence_is(sentence, "DBT") ||
                      nmea0183_connector::sentence_is(sentence, "DPT")) {
                      store_.mark_changed(ModelField::WaterDepthM, source_id, now_us);
                  }
              }

              ModelStore<Real>& store_;
              nmea0183_connector::Nmea0183StreamParser parser_;
              nmea0183_connector::Nmea0183RxConnector<Real> rx_;
          };

          template<typename Real>
          constexpr Real pi_v() { return static_cast<Real>(3.1415926535897932384626433832795L); }

          template<typename Real>
          constexpr Real deg_to_rad(Real deg) { return deg * pi_v<Real>() / static_cast<Real>(180); }

          template<typename Real>
          constexpr Real knots_to_mps(Real knots) { return knots * static_cast<Real>(0.51444444444444444444L); }

          template<typename Real>
          struct SignalKMappedValue {
              const char* path = nullptr;
              Real number{};
          };

          template<typename Real>
          class SignalKMapper {
          public:
              bool map_change(const ship_data_model::DataModel<Real>& model, const ModelChange& change, SignalKMappedValue<Real>& out) const {
                  switch (change.field) {
                  case ModelField::NavigationGpsFixLatDeg:
                      out.path = "navigation.position.value.latitude";
                      out.number = model.navigation.gps.fix_lat_deg.value;
                      return model.navigation.gps.fix_lat_deg.valid;
                  case ModelField::NavigationGpsFixLonDeg:
                      out.path = "navigation.position.value.longitude";
                      out.number = model.navigation.gps.fix_lon_deg.value;
                      return model.navigation.gps.fix_lon_deg.valid;
                  case ModelField::NavigationGpsSpeedKn:
                      out.path = "navigation.speedOverGround";
                      out.number = knots_to_mps<Real>(model.navigation.gps.speed_kn.value);
                      return model.navigation.gps.speed_kn.valid;
                  case ModelField::NavigationGpsTrackDeg:
                      out.path = "navigation.courseOverGroundTrue";
                      out.number = deg_to_rad<Real>(model.navigation.gps.track_deg.value);
                      return model.navigation.gps.track_deg.valid;
                  case ModelField::ImuHeadingDeg:
                      out.path = "navigation.headingTrue";
                      out.number = deg_to_rad<Real>(model.imu.heading_deg.value);
                      return model.imu.heading_deg.valid;
                  case ModelField::WindApparentDirectionDeg:
                      out.path = "environment.wind.angleApparent";
                      out.number = deg_to_rad<Real>(model.wind.apparent.direction_deg.value);
                      return model.wind.apparent.direction_deg.valid;
                  case ModelField::WindApparentSpeedKn:
                      out.path = "environment.wind.speedApparent";
                      out.number = knots_to_mps<Real>(model.wind.apparent.speed_kn.value);
                      return model.wind.apparent.speed_kn.valid;
                  case ModelField::WaterDepthM:
                      out.path = "environment.depth.belowTransducer";
                      out.number = model.water.depth_m.value;
                      return model.water.depth_m.valid;
                  default:
                      return false;
                  }
              }
          };

          template<typename Real = float>
          class SignalKMiniApp {
          public:
              using Store = ModelStore<Real>;
              Store& store() { return store_; }
              Nmea0183Input<Real>& nmea0183() { return nmea0183_; }
          private:
              Store store_{};
              Nmea0183Input<Real> nmea0183_{store_};
          };

          } // namespace signalk_mini
          EOF

          cat > linux/main.cpp <<'EOF'
          #include <iostream>
          #include <string>
          #include <signalk_mini.hpp>

          int main() {
              signalk_mini::SignalKMiniApp<float> app;
              std::string line;
              uint64_t now_us = 0;
              while (std::getline(std::cin, line)) {
                  now_us += 100000;
                  app.nmea0183().feed_line(line.c_str(), 1, now_us);
              }
              std::cout << "changes=" << app.store().sequence() << "\n";
              return 0;
          }
          EOF

          cat > mcu/signalk-atoms3r/signalk-atoms3r.ino <<'EOF'
          #include <signalk_mini.hpp>

          signalk_mini::SignalKMiniApp<float> app;

          void setup() {
            Serial.begin(115200);
          }

          void loop() {
          }
          EOF

          cat > tests/test_signalk_mini_smoke.cpp <<'EOF'
          #include <cmath>
          #include <cstdio>
          #include <cstdlib>
          #include <cstring>
          #include <string>

          #include <signalk_mini.hpp>
          #include <nmea0183_connector.hpp>

          #define REQUIRE(x) do { if (!(x)) { std::fprintf(stderr, "FAILED %s:%d: %s\n", __FILE__, __LINE__, #x); std::exit(1); } } while (0)
          #define NEAR(a,b,e) do { if (std::fabs(static_cast<double>((a) - (b))) > (e)) { std::fprintf(stderr, "NEAR failed %s:%d\n", __FILE__, __LINE__); std::exit(2); } } while (0)

          static std::string sentence(const char* body) {
              char out[160];
              const uint8_t cs = nmea0183_connector::nmea_checksum_body(body);
              std::snprintf(out, sizeof(out), "$%s*%c%c", body, nmea0183_connector::to_hex((cs >> 4) & 0x0f), nmea0183_connector::to_hex(cs & 0x0f));
              return std::string(out);
          }

          int main() {
              using Real = float;
              signalk_mini::SignalKMiniApp<Real> app;
              const char* bodies[] = {
                  "GPRMC,142533.00,A,4042.6142,N,07400.4168,W,5.4,083.2,010726,13.1,W,A",
                  "HCHDT,081.7,T",
                  "IIMWV,045.0,R,12.8,N,A",
                  "SDDPT,5.6,0.4"
              };
              uint64_t now_us = 0;
              for (const char* body : bodies) {
                  const std::string line = sentence(body);
                  now_us += 100000;
                  REQUIRE(app.nmea0183().feed_line(line.c_str(), 7, now_us));
              }
              const auto& model = app.store().model();
              REQUIRE(model.navigation.gps.fix_lat_deg.valid);
              REQUIRE(model.navigation.gps.fix_lon_deg.valid);
              REQUIRE(model.navigation.gps.speed_kn.valid);
              REQUIRE(model.imu.heading_deg.valid);
              REQUIRE(model.wind.apparent.speed_kn.valid);
              REQUIRE(model.water.depth_m.valid);
              NEAR(model.navigation.gps.fix_lat_deg.value, 40.7102367f, 0.0002f);
              NEAR(model.navigation.gps.fix_lon_deg.value, -74.0069467f, 0.0002f);
              NEAR(model.navigation.gps.speed_kn.value, 5.4f, 0.001f);
              NEAR(model.wind.apparent.speed_kn.value, 12.8f, 0.001f);
              NEAR(model.water.depth_m.value, 5.6f, 0.001f);
              signalk_mini::SignalKMapper<Real> mapper;
              signalk_mini::ModelChange change;
              bool saw_wind_speed = false;
              while (app.store().changes().pop(change)) {
                  signalk_mini::SignalKMappedValue<Real> mapped;
                  if (mapper.map_change(app.store().model(), change, mapped) && mapped.path && std::strcmp(mapped.path, "environment.wind.speedApparent") == 0) {
                      saw_wind_speed = true;
                      NEAR(mapped.number, 6.5848889f, 0.001f);
                  }
              }
              REQUIRE(saw_wind_speed);
              return 0;
          }
          EOF

          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "vendor uploaded source modules"
            git push
          fi

  linux:
    needs: vendor-sources
    if: always() && (github.event_name != 'push' || needs.vendor-sources.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DSIGNALK_MINI_FETCH_ARDUINOJSON=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
