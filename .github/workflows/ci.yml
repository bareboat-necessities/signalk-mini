name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-gpsd-watch-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gpsd-connector
          fetch-depth: 0
      - name: Apply GPSD WATCH reconnect fix once
        run: |
          if [ ! -f gpsd-watch-fix.patch.gz.b64 ]; then
            echo 'No GPSD WATCH fix patch present.'
            exit 0
          fi
          base64 -d gpsd-watch-fix.patch.gz.b64 > /tmp/gpsd-watch-fix.patch.gz
          gzip -dc /tmp/gpsd-watch-fix.patch.gz > /tmp/gpsd-watch-fix.patch
          git apply --check /tmp/gpsd-watch-fix.patch
          git apply /tmp/gpsd-watch-fix.patch
          rm gpsd-watch-fix.patch.gz.b64
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Reconnect after failed GPSD WATCH write'
          git push origin HEAD:agent/gpsd-connector
