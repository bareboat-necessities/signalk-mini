name: Apply Signal K typed-store projection

on:
  push:
    branches:
      - agent/signalk-schema-typed-view

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify and install tested source files
        shell: bash
        run: |
          set -euo pipefail
          cat .github/pr65.seg{00..20} | base64 --decode > /tmp/pr65-source-files.tar.gz
          echo 'be7ff4b25dd2d1c55ec72a3b0ec8714950e2001632571d5ea223a83348262994  /tmp/pr65-source-files.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/pr65-source-files.tar.gz
          rm -f .github/pr65.seg* .github/pr65.source.part* .github/pr65.patch.part* .github/pr65.full.*
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Complete Signal K typed-store projection'
          git push origin HEAD:agent/signalk-schema-typed-view
