name: CI

on:
  push:
  pull_request:

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package source
        run: tar -czf /tmp/signalk-mini-gpsd-review-source.tar.gz --exclude=.git .
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: signalk-mini-gpsd-review-source
          path: /tmp/signalk-mini-gpsd-review-source.tar.gz
