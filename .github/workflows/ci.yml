name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-server-clock-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/server-clock-standard-envelope-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/server-clock-standard-envelope-clean
          fetch-depth: 0
      - name: Apply focused heartbeat fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          server = Path('src/signalk_mini/server.hpp')
          text = server.read_text()
          old = '''    void publish_server_clock() {
        const uint64_t now_us = loop_.clock().micros();
        update_server_clock_model(now_us);
        char json[192];
        const unsigned long clock_s = static_cast<unsigned long>(store_.model().comm.server.clock_s.value);
        const int len = snprintf(json,
                                 sizeof(json),
                                 "{\\\"updates\\\":[{\\\"source\\\":{\\\"label\\\":\\\"%s\\\"},\\\"values\\\":[{\\\"path\\\":\\\"communication.server.clock\\\",\\\"value\\\":%lu}]}]}\\r\\n",
                                 server_source_label(),
                                 clock_s);
        if (len <= 0 || static_cast<size_t>(len) >= sizeof(json)) return;
        SignalKDeltaFanout fanout{signalk_connections_.connections, signalk_websocket_handler_};
        fanout.write_signal_k_delta(json, static_cast<size_t>(len));
    }
'''
          new = '''    void publish_server_clock() {
        const uint64_t now_us = loop_.clock().micros();
        update_server_clock_model(now_us);

        char timestamp[32];
        if (!format_signalk_timestamp_utc(timestamp, sizeof(timestamp))) return;
        const char* context = config_.identity.self && config_.identity.self[0]
            ? config_.identity.self
            : "vessels.self";

        char json[320];
        const unsigned long clock_s = static_cast<unsigned long>(store_.model().comm.server.clock_s.value);
        const int len = snprintf(
            json,
            sizeof(json),
            "{\\\"context\\\":\\\"%s\\\",\\\"updates\\\":[{\\\"timestamp\\\":\\\"%s\\\",\\\"source\\\":{\\\"label\\\":\\\"%s\\\"},\\\"values\\\":[{\\\"path\\\":\\\"communication.server.clock\\\",\\\"value\\\":%lu}]}]}\\r\\n",
            context,
            timestamp,
            server_source_label(),
            clock_s);
        if (len <= 0 || static_cast<size_t>(len) >= sizeof(json)) return;
        SignalKDeltaFanout fanout{signalk_connections_.connections, signalk_websocket_handler_};
        fanout.write_signal_k_delta(json, static_cast<size_t>(len));
    }
'''
          if old not in text:
              raise SystemExit('publish_server_clock marker not found')
          server.write_text(text.replace(old, new, 1))

          test = Path('tests/test_signalk_mini_websocket_integration.cpp')
          text = test.read_text()
          old = '''            if (std::strcmp(path, "communication.server.clock") == 0) {
                REQUIRE(value["value"].is<double>() || value["value"].is<float>() || value["value"].is<int>());
                return true;
            }
'''
          new = '''            if (std::strcmp(path, "communication.server.clock") == 0) {
                REQUIRE(std::strcmp(doc["context"] | "", "vessels.self") == 0);
                const char* timestamp = update["timestamp"].as<const char*>();
                REQUIRE(timestamp != nullptr);
                REQUIRE(std::strlen(timestamp) == 24);
                REQUIRE(timestamp[10] == 'T' && timestamp[23] == 'Z');
                REQUIRE(value["value"].is<double>() || value["value"].is<float>() || value["value"].is<int>());
                return true;
            }
'''
          if old not in text:
              raise SystemExit('clock delta test marker not found')
          test.write_text(text.replace(old, new, 1))
          PY
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/signalk_mini/server.hpp tests/test_signalk_mini_websocket_integration.cpp .github/workflows/ci.yml
          git commit -m "Add standard envelope to server clock deltas"
          git push origin HEAD:fix/server-clock-standard-envelope-clean

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libevent-dev libconfig-dev pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Upload CTest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-diagnostics
          path: build/Testing/Temporary/
          if-no-files-found: ignore

  arduino-atoms3r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v2
      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib update-index
          arduino-cli lib install M5Unified
          arduino-cli lib install ArduinoJson
      - name: Prepare vendored module libraries
        run: |
          printf '%s\n' 'name=signalk-mini-async-event-loop' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored async event loop module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=async_event_loop.hpp' > modules/async-event-loop/library.properties
          printf '%s\n' 'name=signalk-mini-data-model' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored data model module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Data Processing' 'architectures=esp32' 'includes=ship_data_model.hpp' > modules/data-model/library.properties
          printf '%s\n' 'name=signalk-mini-nmea0183' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored NMEA0183 module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=nmea0183_connector.hpp' > modules/nmea0183/library.properties
          printf '%s\n' 'name=signalk-mini-seatalk' 'version=0.1.0' 'author=Bareboat Necessities' 'maintainer=Bareboat Necessities' 'sentence=Vendored SeaTalk module for signalk-mini.' 'paragraph=Source-only vendored module used by signalk-mini.' 'category=Communication' 'architectures=esp32' 'includes=seatalk.hpp' > modules/seatalk/library.properties
      - name: Compile AtomS3R sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3 \
            --library . \
            --library modules/async-event-loop \
            --library modules/data-model \
            --library modules/nmea0183 \
            --library modules/seatalk \
            mcu/signalk-atoms3r
