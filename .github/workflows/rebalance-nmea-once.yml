name: Rebalance NMEA headers once

on:
  push:
    branches:
      - codex/balance-nmea-headers

permissions:
  contents: write

jobs:
  rebalance:
    if: ${{ !contains(github.event.head_commit.message, '[rebalance-generated]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebalance headers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('modules/nmea0183/src/nmea0183_connector')
          ae = root / 'nmea_A_E.hpp'
          fg = root / 'nmea_F_G.hpp'
          hn = root / 'nmea_H_N.hpp'
          oz = root / 'nmea_O_Z.hpp'
          rx = root / 'nmea_rx_connector.hpp'

          def body(path: Path) -> str:
              lines = path.read_text().splitlines()
              if lines and lines[0] == '#pragma once':
                  lines = lines[1:]
              while lines and lines[0] == '':
                  lines = lines[1:]
              if lines and lines[0].startswith('// Included inside'):
                  lines = lines[1:]
              while lines and lines[0] == '':
                  lines = lines[1:]
              return '\n'.join(lines).rstrip() + '\n'

          def header(title: str, content: str) -> str:
              return '#pragma once\n\n// Included inside Nmea0183RxConnector.\n// Balanced NMEA sentence group: ' + title + '.\n\n' + content.rstrip() + '\n'

          fg_text = body(fg)
          hn_text = body(hn)
          oz_text = body(oz)

          split_s = 'template<typename Model>\nbool apply_sfi'
          split_v = 'template<typename Model>\nbool apply_vbw'
          if split_s not in oz_text or split_v not in oz_text:
              raise SystemExit('expected O-Z split markers not found')
          oz_or, rest = oz_text.split(split_s, 1)
          st_text, vz_text = (split_s + rest).split(split_v, 1)
          vz_text = split_v + vz_text

          fr_text = fg_text.rstrip() + '\n\n' + hn_text.rstrip() + '\n\n' + oz_or.rstrip() + '\n'
          (root / 'nmea_F_R.hpp').write_text(header('F-R', fr_text))
          (root / 'nmea_S_T.hpp').write_text(header('S-T', st_text))
          (root / 'nmea_V_Z.hpp').write_text(header('V-Z', vz_text))

          for old in (fg, hn, oz):
              old.unlink()

          rx_text = rx.read_text()
          rx_text = rx_text.replace('#include "nmea_F_G.hpp"\n#include "nmea_H_N.hpp"\n#include "nmea_O_Z.hpp"',
                                    '#include "nmea_F_R.hpp"\n#include "nmea_S_T.hpp"\n#include "nmea_V_Z.hpp"')
          rx.write_text(rx_text)

          for path in [ae, root / 'nmea_F_R.hpp', root / 'nmea_S_T.hpp', root / 'nmea_V_Z.hpp']:
              print(f'{path}: {len(path.read_text().splitlines())} lines')
          PY
      - name: Commit generated rebalance
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/nmea0183/src/nmea0183_connector
          git commit -m "rebalance NMEA alphabetical headers [rebalance-generated]"
          git push
# trigger
