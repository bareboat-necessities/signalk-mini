identity: {
  server_name = "signalk-mini";
  server_version = "0.1.0";
  self = "vessels.self";
};

signalk: {
  host = "0.0.0.0";
  port = 20223;
  max_connections = 8;
  allow_rx = true;
  allow_tx = true;

  websocket: {
    enabled = true;
    host = "0.0.0.0";
    port = 3001;
    max_connections = 8;
    allow_rx = true;
    allow_tx = true;
  };
};

publisher: {
  interval_us = 10000;
  max_changes_per_tick = 32;
  json_buffer_size = 512;
  source_label = "signalk-mini";
};

connectors = (
  {
    enabled = true;
    label = "nmea0183-udp-10110";
    protocol = "nmea0183";
    transport = "udp";

    access: {
      allow_rx = true;
      allow_tx = false;
    };

    nmea0183: {
      validate_checksum = false;
    };

    udp: {
      listen_host = "0.0.0.0";
      listen_port = 10110;
      allow_broadcast = true;
    };
  },
  {
    enabled = false;
    label = "nmea0183-tcp-client";
    protocol = "nmea0183";
    transport = "tcp_client";

    access: {
      allow_rx = true;
      allow_tx = false;
    };

    nmea0183: {
      validate_checksum = false;
    };

    tcp_client: {
      host = "127.0.0.1";
      port = 10110;
    };
  },
  {
    enabled = false;
    label = "nmea0183-tcp-server";
    protocol = "nmea0183";
    transport = "tcp_server";

    access: {
      allow_rx = true;
      allow_tx = false;
    };

    nmea0183: {
      validate_checksum = false;
    };

    tcp_server: {
      host = "0.0.0.0";
      port = 20224;
    };
  },
  {
    enabled = false;
    label = "nmea0183-serial";
    protocol = "nmea0183";
    transport = "serial";

    access: {
      allow_rx = true;
      allow_tx = false;
    };

    nmea0183: {
      validate_checksum = true;
    };

    serial: {
      device = "/dev/ttyUSB0";
      baud = 4800;
    };
  }
  ,
  {
    enabled = false;
    label = "ublox-serial";
    protocol = "ubx";
    transport = "serial";
    access = { allow_rx = true; allow_tx = false; };
    ubx = { configure_receiver = false; };
    serial = { device = "/dev/ttyACM0"; baud = 115200; };
    reconnect = { enabled = true; initial_delay_ms = 1000; maximum_delay_ms = 30000; };
  },
  {
    enabled = false;
    label = "gpsd-main";
    protocol = "gpsd";
    transport = "tcp_client";
    access = { allow_rx = true; allow_tx = false; };
    tcp_client = { host = "127.0.0.1"; port = 2947; };
    gpsd = { device = "/dev/ttyACM0"; include_sky = true; include_gst = true; };
    reconnect = { enabled = true; initial_delay_ms = 1000; maximum_delay_ms = 30000; };
  }
);
