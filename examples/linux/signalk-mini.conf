identity: {
  server_name = "signalk-mini";
  server_version = "0.1.0";
  self = "vessels.self";
};

signalk: {
  host = "0.0.0.0";
  port = 20223;
  max_connections = 8;
  allow_rx = true;
  allow_tx = true;
};

publisher: {
  interval_us = 10000;
  max_changes_per_tick = 32;
  json_buffer_size = 512;
  source_label = "signalk-mini";
};

connectors = (
  {
    enabled = true;
    protocol = "nmea0183";
    transport = "tcp_client";
    label = "nmea0183-tcp-client";
    host = "127.0.0.1";
    port = 10110;
    allow_rx = true;
    allow_tx = false;
  },
  {
    enabled = false;
    protocol = "nmea0183";
    transport = "tcp_server";
    label = "nmea0183-tcp-server";
    host = "0.0.0.0";
    port = 20224;
    allow_rx = true;
    allow_tx = false;
  },
  {
    enabled = false;
    protocol = "nmea0183";
    transport = "serial";
    label = "nmea0183-serial";
    device = "/dev/ttyUSB0";
    baud = 4800;
    allow_rx = true;
    allow_tx = false;
  }
);
